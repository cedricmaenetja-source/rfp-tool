<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thank You – Proposal Submitted</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f2f1ee;
      --card: #ffffff;
      --text: #111827;
      --muted: #8a8880;
      --border: #e2e0db;
      --surface: #f8f7f5;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Geist', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 36px 32px;
      max-width: 440px;
      width: 100%;
      text-align: center;
    }

    .icon {
      width: 52px;
      height: 52px;
      margin: 0 auto 20px;
      border-radius: 10px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg {
      width: 22px;
      height: 22px;
      stroke: #15803d;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    p {
      font-size: 13.5px;
      color: var(--muted);
      line-height: 1.65;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    .redirect {
      font-size: 12.5px;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .countdown-ring {
      position: relative;
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }

    .countdown-ring svg {
      transform: rotate(-90deg);
      width: 28px;
      height: 28px;
    }

    .countdown-ring circle {
      fill: none;
      stroke-width: 2.5;
    }

    .countdown-ring .track { stroke: var(--border); }

    .countdown-ring .progress {
      stroke: var(--text);
      stroke-linecap: round;
      stroke-dasharray: 72;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear;
    }

    .countdown-ring .label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 600;
      color: var(--text);
    }

    .footer {
      margin-top: 28px;
      font-size: 11px;
      color: #c4c1bb;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

  <div class="card">

    <div class="icon">
      <svg viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>

    <h1>Thank You!</h1>

    <p>
      Your submission has been received successfully.
      We appreciate the time and effort you put into your response.
      Our team will review it and reach out if any further information is needed.
    </p>

    <div class="divider"></div>

    <div class="redirect">
      <div class="countdown-ring">
        <svg viewBox="0 0 28 28">
          <circle class="track" cx="14" cy="14" r="11.5"/>
          <circle class="progress" id="progressRing" cx="14" cy="14" r="11.5"/>
        </svg>
        <div class="label"><span id="countdown">10</span></div>
      </div>
      Redirecting in <span id="countdownText">10</span> seconds
    </div>

  </div>

  <div class="footer">Powered by Udder</div>

  <script>
    const TOTAL = 10;
    const circumference = 2 * Math.PI * 11.5;
    const ring = document.getElementById('progressRing');
    const countdownEl = document.getElementById('countdown');
    const countdownText = document.getElementById('countdownText');

    ring.style.strokeDasharray = circumference;
    ring.style.strokeDashoffset = 0;

    let seconds = TOTAL;

    const timer = setInterval(() => {
      seconds--;
      countdownEl.textContent = seconds;
      countdownText.textContent = seconds;
      ring.style.strokeDashoffset = circumference * (1 - seconds / TOTAL);

      if (seconds <= 0) {
        clearInterval(timer);
        window.location.href = 'https://udder.rocks';
      }
    }, 1000);
  </script>

</body>
</html>
