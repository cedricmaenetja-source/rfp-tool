<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Already Submitted</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: #fff;
      padding: 40px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .icon {
      width: 70px;
      height: 70px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: #fde2e2;
      color: #d32f2f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 26px;
      color: #222;
    }

    p {
      margin: 0 0 20px;
      color: #555;
      line-height: 1.6;
      font-size: 15px;
    }

    .redirect {
      font-size: 14px;
      color: #2563eb;
      font-weight: 500;
    }

    .footer {
      margin-top: 25px;
      font-size: 13px;
      color: #888;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="icon">⚠</div>

    <h1>Already Submitted</h1>

    <p>
      You have already submitted your proposal.  
      Duplicate submissions are not allowed. You will be redirected shortly.
    </p>

    <div class="redirect">
      Redirecting in <span id="countdown">10</span> seconds…
    </div>

    <div class="footer">
      Powered by Udder
    </div>
  </div>

  <script>
    let seconds = 10;
    const countdownEl = document.getElementById('countdown');

    const timer = setInterval(() => {
      seconds--;
      countdownEl.textContent = seconds;

      if (seconds <= 0) {
        clearInterval(timer);
        window.location.href = 'https://udder.rocks';
      }
    }, 1000);
  </script>

</body>
</html>
