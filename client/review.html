<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Requirements - Review</title>

  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f2f1ee;
      --card: #ffffff;
      --primary: #111;
      --primary-hover: #333;
      --text: #111827;
      --muted: #8a8880;
      --border: #e2e0db;
      --border-strong: #c8c5be;
      --surface: #f8f7f5;
      --accent: #1a1a1a;
      --focus-ring: rgba(0,0,0,0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }

    body {
      font-family: 'Geist', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 16px 60px;
    }

    /* ── PAGE HEADER ── */
    .page-eyebrow {
      width: 70%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .page-eyebrow-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-chip {
      width: 28px;
      height: 28px;
      background: var(--text);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-chip svg { width: 13px; height: 13px; fill: white; }

    .page-brand {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .page-brand span {
      color: var(--muted);
      font-weight: 400;
      margin-left: 6px;
    }

    .status-chip {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--surface);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    /* ── CARD ── */
    .card {
      background: var(--card);
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      margin-bottom: 16px;
      overflow: hidden;
    }

    .card-body {
      padding: 28px 32px;
    }

    /* ── COLLAPSIBLE CLIENT INFO ── */
    .collapse-trigger {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 28px;
      background: none;
      border: none;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      text-align: left;
      transition: background 0.14s ease;
    }

    .collapse-trigger:hover { background: var(--surface); }

    .collapse-trigger[aria-expanded="false"] {
      border-bottom-color: transparent;
    }

    .collapse-trigger-left h2 {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 2px;
    }

    .collapse-trigger-left p {
      font-size: 13px;
      color: var(--muted);
    }

    .collapse-chevron {
      color: var(--muted);
      display: flex;
      align-items: center;
      flex-shrink: 0;
      transition: transform 0.22s ease;
    }

    .collapse-trigger[aria-expanded="false"] .collapse-chevron {
      transform: rotate(180deg);
    }

    .collapse-body {
      padding: 24px 28px 28px;
      overflow: hidden;
      transition: max-height 0.28s ease, opacity 0.22s ease, padding 0.22s ease;
      max-height: 800px;
      opacity: 1;
    }

    .collapse-body.collapsed {
      max-height: 0;
      opacity: 0;
      padding-top: 0;
      padding-bottom: 0;
    }

    /* ── FIELD GROUPS (labelled inputs) ── */
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex: 1;
    }

    .field-label {
      font-size: 11.5px;
      font-weight: 500;
      letter-spacing: 0.03em;
      color: var(--muted);
    }

    /* ── HEADINGS ── */
    h2 {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    p {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    .card-header-block {
      padding: 20px 28px;
      border-bottom: 1px solid var(--border);
    }

    .section-title {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 20px 0 10px;
    }

    /* ── FORM ELEMENTS ── */
    .input-row {
      display: flex;
      gap: 14px;
      margin-bottom: 14px;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    input[type="number"],
    input[type="input"],
    textarea,
    select {
      flex: 1;
      padding: 10px 13px;
      border-radius: 7px;
      border: 1px solid var(--border);
      font-size: 13.5px;
      font-family: 'Geist', sans-serif;
      background: var(--surface);
      color: var(--text);
      transition: border-color 0.14s ease, background 0.14s ease;
      appearance: none;
      -webkit-appearance: none;
    }

    input::placeholder, textarea::placeholder { color: #bbb9b3; }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--border-strong);
      background: #fff;
    }

    .required {
      color: #dc2626;
      font-weight: 600;
      margin-left: 2px;
      font-size: 11px;
    }

    textarea { resize: vertical; min-height: 80px; width: 100%; }

    /* ── BUTTONS ── */
    button {
      padding: 10px 18px;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      font-family: 'Geist', sans-serif;
      font-weight: 500;
      transition: all 0.14s ease;
    }

    .add-btn { background: var(--primary); color: white; margin-top: 10px; }
    .add-btn:hover { background: var(--primary-hover); }

    .btn { background: var(--primary); color: white; font-weight: 600; }
    .btn:hover { background: var(--primary-hover); }

    #saveDraft {
      background: white;
      color: var(--text);
      border: 1px solid var(--border-strong);
    }
    #saveDraft:hover { background: var(--surface); }

    /* ── LIST ITEMS ── */
    ul { list-style: none; padding: 0; margin: 0 0 20px; }

    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 7px;
      margin-bottom: 7px;
      background: var(--surface);
      font-size: 13.5px;
      color: var(--text);
      transition: border-color 0.12s;
    }

    li:hover { border-color: var(--border-strong); }

    .remove {
      background: none;
      color: #d1a0a0;
      font-weight: 500;
      cursor: pointer;
      padding: 4px 8px;
      font-size: 12px;
      border-radius: 5px;
      transition: color 0.12s, background 0.12s;
    }

    .remove:hover { color: #b91c1c; background: #fef2f2; }

    .hide { display: none !important; }

    /* ── NOTE BAR ── */
    .note {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid #111;
      padding: 14px 18px;
      border-radius: 8px;
      font-size: 13px;
      color: var(--text);
      margin: 0 0 16px;
      line-height: 1.6;
    }

    .note strong { color: var(--text); white-space: nowrap; font-weight: 600; }

    /* ── WARNING ── */
    .warning {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 7px;
    }

    .warning select,
    .warning button {
      background: transparent !important;
      /* border: none; */
    }

    /* ── LOADER ── */
    .loader {
      width: 36px;
      height: 36px;
      border: 3px solid #e5e3df;
      border-bottom-color: var(--text);
      border-radius: 50%;
      display: inline-block;
      animation: rotation 0.8s linear infinite;
    }

    @keyframes rotation {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 14px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin: 18px 0 20px;
    }

    .filter-bar label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .filter-bar select {
      padding: 7px 11px;
      font-size: 12.5px;
      border-radius: 6px;
      min-width: 120px;
      flex: unset;
    }

    .filter-bar input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: var(--text);
      cursor: pointer;
      flex: unset;
    }

    /* ── REQUIREMENTS TABLE ── */
    #requirementsTable {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
      margin-top: 4px;
    }

    #requirementsTable thead tr { border-bottom: 1px solid var(--border); }

    #requirementsTable thead th,
    #requirementsTable thead td {
      padding: 9px 12px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    #requirementsTable tbody tr {
      border-bottom: 1px solid #f0ede8;
      transition: background 0.12s ease;
    }

    #requirementsTable tbody tr:last-child { border-bottom: none; }
    #requirementsTable tbody tr:hover { background: var(--surface); }

    #requirementsTable tbody td {
      padding: 12px 12px;
      font-size: 13.5px;
      color: #4b4a47;
      vertical-align: middle;
    }

    #requirementsTable tbody td:first-child { color: var(--muted); width: 36px; }

    #requirementsTable select {
      padding: 5px 9px;
      font-size: 12.5px;
      border-radius: 5px;
      min-width: 100px;
      flex: unset;
    }

    /* ── TITLE INPUT (inline label) ── */
    label.section-title input { display: block; margin-top: 8px; width: 100%; }

    /* ── BUTTON ROW ── */
    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    /* ── JS-GENERATED TABLE ROW ELEMENTS ── */
    .row-checkbox {
      width: 15px;
      height: 15px;
      accent-color: var(--text);
      cursor: pointer;
      transform: scale(1.4);
      margin-left: 4px;
      border: 1px solid var(--border);
      border-radius: 4px;
    }

    .rec-cell {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .comment-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 5px 7px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.14s ease;
    }

    .comment-btn:hover {
      background: var(--card);
      border-color: var(--border-strong);
      color: var(--text);
    }

    .warn-icon {
      display: inline-flex;
      align-items: center;
      color: #b91c1c;
      cursor: pointer;
    }

    #requirementsTable tbody tr.warning { background: #fef2f2; }
    #requirementsTable tbody tr.warning td { color: #991b1b; }
    #requirementsTable tbody tr.warning select,
    #requirementsTable tbody tr.warning .comment-btn {
      background: transparent;
      border-color: #fecaca;
    }

    /* ── SELECT2 OVERRIDE ── */
    .select2-container--default .select2-selection--single {
      height: 42px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--surface);
    }

    .select2-container--default .select2-selection--single .select2-selection__rendered {
      line-height: 42px;
      padding-left: 13px;
      color: var(--text);
      font-size: 13.5px;
      font-family: 'Geist', sans-serif;
    }

    .select2-container--default .select2-selection--single .select2-selection__arrow { height: 42px; }

    .select2-dropdown {
      border: 1px solid var(--border-strong);
      border-radius: 7px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.07);
      font-family: 'Geist', sans-serif;
      font-size: 13.5px;
    }

    .select2-container--default .select2-results__option--highlighted[aria-selected] {
      background: var(--surface);
      color: var(--text);
    }

    .select2-container--default .select2-results__option[aria-selected=true] { background: #f0ede8; }

    .select2-search--dropdown .select2-search__field {
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 7px 10px;
      font-family: 'Geist', sans-serif;
      font-size: 13px;
    }

    /* ── SWEETALERT OVERRIDES ── */
    .swal2-confirm {
      margin-left: 10px;
      background: var(--text) !important;
      border-radius: 7px !important;
    }

    .swal2-cancel {
      background-color: #dc2626 !important;
      color: white;
      border-radius: 7px !important;
    }

    /* ── FOOTER ── */
    footer { margin-top: 32px; text-align: center; }
    .footer-text { font-size: 11px; color: #c4c1bb; letter-spacing: 0.04em; }

    .main { width: 70%; }
  </style>
</head>

        </label>

        <!-- Filter bar -->
        <div class="filter-bar">
          <label for="categoryFilter">Filter by Category</label>
          <select id="categoryFilter" style="padding:7px 11px; border:1px solid var(--border); border-radius:6px; margin-left:0;">
            <option value="">All Categories</option>
          </select>

          <label for="keepAll" style="margin-left:8px;">Mark All as 'Keep'</label>
          <input style="transform: scale(1.4); border:1px solid #ccc; border-radius:6px; cursor:pointer;" type="checkbox" name="keepAll" id="keepAll">

          <label for="recommendationOptions" style="margin-left:8px;">Mark Selected As</label>

          <tbody></tbody>

        <div class="btn-row">

  </footer>

  <script>
    // Collapsible client info
    $('#clientInfoToggle').on('click', function () {
      const $body = $('#clientInfoBody');
      const expanded = $(this).attr('aria-expanded') === 'true';

      $(this).attr('aria-expanded', !expanded);
      $body.toggleClass('collapsed', expanded);
    });
  </script>
