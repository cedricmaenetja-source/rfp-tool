<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RFP Tool</title>
    <script src="https://code.jquery.com/jquery-3.3.1.js"></script>
    <style>
      body {
        margin: 0;
        font-family: 'Inter', system-ui, sans-serif !important;
        background: #f5f5f5;
        color: #111827;
      }
      .container {
        display: grid;
        place-items: center; 
        height: 100vh;
      }
    </style>
<body>
  <div class="container">
    <div id="xloader"></div>
  </div>
  <script type="module">
    import { xloader, loggedIn, pages } from './assets/js/app.js';

    $(function(){
        $('#xloader').append(xloader());
        if (loggedIn){
          location.href = pages.dashboard;
        }else{
          location.href = pages.login;
        }
    });
  </script>
</body>
</html>
